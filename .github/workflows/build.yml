name: Build Android App (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настраиваем Java 17 (обязательно для AGP 8.5+ и Kotlin 2.0)
      - name: Set up JDK 17 👉🏻
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3. Даём права на запуск Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. Собираем Debug APK 📦
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 5. Опционально: прогоняем тесты ✅
      # Если у тебя есть модульные или UI-тесты, можно добавить этот шаг
      # - name: Run Unit Tests
      #   run: ./gradlew test --no-daemon

      # 6. Опционально: выгружаем артефакт в Artifacts GitHub Actions ⬇️
      # Это позволит скачать собранную .apk прямо с интерфейса действий
      # - name: Upload APK as artifact
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: app-debug.apk
      #     path: app/build/outputs/apk/debug/app-debug.apk
      # 6. Прогоняем тесты (чтобы убедиться, что логика не сломана)
      - name: Run Unit Tests
        run: ./gradlew test --no-daemon
